<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Radarly</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    /* ── Event type badges ───────────────────────────────── */
    .event-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .ev-dividend { background: #dcfce7; color: #166534; }
    .ev-bonus    { background: #dbeafe; color: #1e40af; }
    .ev-split    { background: #ede9fe; color: #5b21b6; }
    .ev-buyback  { background: #ffedd5; color: #9a3412; }
    .ev-ipo      { background: #fef9c3; color: #713f12; }
    .ev-rights   { background: #fce7f3; color: #831843; }
    .ev-default  { background: var(--bg); color: var(--text-secondary); }

    /* ── Filter tabs (shared by both time-range and type rows) ── */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }
    .filter-row-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-right: 4px;
      white-space: nowrap;
    }
    .filter-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    /* Time range row uses a subtler accent */
    .range-tab.active {
      background: var(--text);
      color: var(--surface);
      border-color: var(--text);
    }
    .range-tab:hover { border-color: var(--text); color: var(--text); }

    .filters-wrap {
      margin-bottom: 16px;
    }

    /* ── Summary cards ───────────────────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .summary-card { cursor: default; }
    .summary-card.clickable { cursor: pointer; transition: box-shadow 0.15s; }
    .summary-card.clickable:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .summary-label {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 4px;
    }
    .summary-value {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .summary-action {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Section header row ──────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .section-header h2 { margin: 0; }

    /* ── Event details cell ──────────────────────────────── */
    .ev-details {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .ev-details strong { color: var(--text); font-weight: 600; }

    /* ── No events empty state ───────────────────────────── */
    .no-events {
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/dashboard.html"><img src="/assets/logo-nav.png" alt="Radarly" class="nav-logo"></a>
    <div class="nav-links">
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/stocks.html">Stocks</a>
      <a href="/settings.html">Alerts</a>
      <a href="/account.html">Account</a>
      <a href="#" onclick="logout()" style="color:var(--danger)">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div id="alert-box"></div>

    <h1 class="page-title" id="greeting">Dashboard</h1>

    <!-- Summary cards -->
    <div class="summary-grid">
      <div class="card summary-card">
        <div class="summary-label">Upcoming Events</div>
        <div class="summary-value" id="event-count">—</div>
        <div class="summary-action" id="event-range-label">Next 30 days</div>
      </div>
      <div class="card summary-card clickable" onclick="window.location.href='/mystocks.html'" title="View My Stocks">
        <div class="summary-label">My Stocks</div>
        <div class="summary-value" id="stock-count">—</div>
        <div class="summary-action">View My Stocks →</div>
      </div>
      <div class="card summary-card">
        <div class="summary-label">Today</div>
        <div class="summary-value" id="today-date" style="font-size:15px;font-weight:600;margin-top:6px;">—</div>
      </div>
    </div>

    <!-- Upcoming Events section -->
    <div class="section-header">
      <h2>Upcoming Events</h2>
    </div>

    <!-- Filters -->
    <div class="filters-wrap">
      <!-- Time range row -->
      <div class="filter-row" id="range-tabs">
        <span class="filter-row-label">Show:</span>
        <!-- populated by JS -->
      </div>
      <!-- Event type row (hidden until multiple types exist) -->
      <div class="filter-row" id="type-tabs" style="display:none;">
        <span class="filter-row-label">Type:</span>
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Events table -->
    <div id="events-container">
      <div class="spinner"></div>
    </div>
  </div>

  <footer class="site-footer">Built in Chennai ❤️ for India 🇮🇳</footer>

  <script src="/assets/app.js"></script>
  <script>
    // ── State ───────────────────────────────────────────────────────────────
    let allEvents   = [];
    let activeFilter = 'ALL';
    let activeDays   = 30;

    const DAY_OPTIONS = [7, 14, 30, 60, 90];

    // ── Init ────────────────────────────────────────────────────────────────
    (async () => {
      const user = await requireLogin();
      if (!user) return;

      // Greeting
      const greetEl = document.getElementById('greeting');
      greetEl.innerHTML = `Hi ${user.name || 'there'}! <button class="refresh-btn" onclick="refreshData()" title="Refresh" id="refresh-btn"><span class="refresh-icon">&#x21bb;</span></button>`;

      // Today
      document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN', {
        weekday: 'short', day: '2-digit', month: 'short', year: 'numeric'
      });

      // Phone nudge
      if (!user.phone) {
        document.getElementById('alert-box').innerHTML = `
          <div class="alert alert-warning" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <span>Add your WhatsApp number to receive stock alerts.</span>
            <a href="/account.html" class="btn btn-primary" style="text-decoration:none;padding:6px 16px;font-size:13px;">Add Phone Number</a>
          </div>
        `;
      }

      renderRangeTabs();
      await loadDashboardData();
    })();

    // ── Load data ───────────────────────────────────────────────────────────
    async function loadDashboardData() {
      // Show spinner in events area while fetching
      document.getElementById('events-container').innerHTML = '<div class="spinner"></div>';

      const [stocksRes, eventsRes] = await Promise.all([
        api('GET', '/api/user/stocks').catch(() => ({ stocks: [] })),
        api('GET', `/api/events/upcoming?days=${activeDays}`).catch(() => ({ events: [] })),
      ]);

      // Stock count
      document.getElementById('stock-count').textContent = stocksRes.stocks.length;

      // Store events
      allEvents    = eventsRes.events || [];
      activeFilter = 'ALL';  // Reset type filter on every data reload

      // Update summary card
      document.getElementById('event-count').textContent = allEvents.length;
      document.getElementById('event-range-label').textContent = `Next ${activeDays} days`;

      renderTypeTabs();
      renderEvents(allEvents);
    }

    // ── Time range chips ────────────────────────────────────────────────────
    function renderRangeTabs() {
      const row = document.getElementById('range-tabs');
      // Keep the label span, replace only the buttons
      const label = row.querySelector('.filter-row-label');
      row.innerHTML = '';
      row.appendChild(label);

      for (const d of DAY_OPTIONS) {
        const btn = document.createElement('button');
        btn.className = `filter-tab range-tab${d === activeDays ? ' active' : ''}`;
        btn.textContent = d < 30 ? `${d} days` : d === 30 ? '1 month' : d === 60 ? '2 months' : '3 months';
        btn.onclick = () => setDays(d);
        row.appendChild(btn);
      }
    }

    async function setDays(days) {
      if (days === activeDays) return;
      activeDays = days;
      renderRangeTabs();
      await loadDashboardData();
    }

    // ── Event type chips ────────────────────────────────────────────────────
    function renderTypeTabs() {
      const typesInData = [...new Set(allEvents.map(e => e.action_type))].sort();
      const row = document.getElementById('type-tabs');

      if (typesInData.length <= 1) {
        row.style.display = 'none';
        return;
      }

      row.style.display = 'flex';
      const label = row.querySelector('.filter-row-label');
      row.innerHTML = '';
      row.appendChild(label);

      const tabs = ['ALL', ...typesInData];
      for (const t of tabs) {
        const count = t === 'ALL' ? allEvents.length : allEvents.filter(e => e.action_type === t).length;
        const btn = document.createElement('button');
        btn.className = `filter-tab${t === activeFilter ? ' active' : ''}`;
        btn.dataset.type = t;
        btn.innerHTML = `${t === 'ALL' ? 'All Types' : formatType(t)} <span style="opacity:0.65;font-size:12px;">(${count})</span>`;
        btn.onclick = () => setTypeFilter(t);
        row.appendChild(btn);
      }
    }

    function setTypeFilter(type) {
      activeFilter = type;
      // Toggle active class
      document.querySelectorAll('#type-tabs .filter-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
      });
      const filtered = type === 'ALL' ? allEvents : allEvents.filter(e => e.action_type === type);
      renderEvents(filtered);
    }

    // ── Event type helpers ──────────────────────────────────────────────────
    function formatType(code) {
      const names = {
        DIVIDEND: 'Dividend',
        BONUS:    'Bonus',
        SPLIT:    'Split',
        BUYBACK:  'Buyback',
        IPO:      'IPO',
        RIGHTS:   'Rights',
      };
      return names[code] || code;
    }

    function eventBadgeClass(code) {
      const cls = {
        DIVIDEND: 'ev-dividend',
        BONUS:    'ev-bonus',
        SPLIT:    'ev-split',
        BUYBACK:  'ev-buyback',
        IPO:      'ev-ipo',
        RIGHTS:   'ev-rights',
      };
      return cls[code] || 'ev-default';
    }

    // ── Parse amount from raw text (fallback for older DB records) ───────────
    function extractAmountFromText(text) {
      if (!text) return null;
      // Handles: "Rs 4.25", "Rs. 4.25", "Rs. - 4.25", "INR 4.25", "₹4.25"
      const m = text.match(/(?:RS\.?|INR|₹)\s*[-–]?\s*(\d+(?:\.\d+)?)/i);
      return m ? parseFloat(m[1]) : null;
    }

    // ── Build detail string per action type ─────────────────────────────────
    function buildDetails(event) {
      const d         = event.details || {};
      const lastPrice = event.stocks_master?.last_price;
      const type      = event.action_type;
      const raw       = d.raw_purpose || '';

      if (type === 'DIVIDEND') {
        // Use stored amount, or parse from raw_purpose as fallback
        const amount = d.amount || extractAmountFromText(raw);
        if (amount) {
          const yieldPct = lastPrice ? ((amount / lastPrice) * 100).toFixed(2) : null;
          return `<strong>₹${amount}/share</strong>` +
            (yieldPct ? `<br><span style="color:var(--text-secondary);font-size:11px;">Yield: ${yieldPct}%</span>` : '');
        }
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'BONUS') {
        const ratioMatch = raw.match(/\d+\s*:\s*\d+/);
        if (ratioMatch) return `<strong>${ratioMatch[0]}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Bonus shares</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'SPLIT') {
        const ratioMatch = raw.match(/\d+\s*:\s*\d+/);
        if (ratioMatch) return `<strong>${ratioMatch[0]}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Split ratio</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'BUYBACK') {
        const amount = extractAmountFromText(raw);
        if (amount) return `<strong>₹${amount.toLocaleString('en-IN')}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Buyback price</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'RIGHTS') {
        const ratioMatch = raw.match(/\d+\s*:\s*\d+/);
        if (ratioMatch) return `<strong>${ratioMatch[0]}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Rights ratio</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      return raw ? truncate(raw, 60) : '—';
    }

    function truncate(str, n) {
      return str.length > n ? str.substring(0, n) + '…' : str;
    }

    // ── Render events table ─────────────────────────────────────────────────
    function renderEvents(events) {
      const container = document.getElementById('events-container');

      if (events.length === 0) {
        const label = activeDays < 30 ? `${activeDays} days` :
                      activeDays === 30 ? '1 month' :
                      activeDays === 60 ? '2 months' : '3 months';
        container.innerHTML = `<div class="card no-events">No upcoming events in the next ${label}.</div>`;
        return;
      }

      let html = '<div class="table-wrap"><table><thead><tr>';
      html += '<th>Type</th><th>Symbol</th><th>Company</th><th>Ex-Date</th><th>Details</th><th>Exchange</th>';
      html += '</tr></thead><tbody>';

      for (const ev of events) {
        const co        = ev.stocks_master?.company_name || ev.symbol;
        const exchange  = ev.stocks_master?.exchange || '—';
        const badgeCls  = exchange === 'NSE' ? 'badge-nse' : exchange === 'BSE' ? 'badge-bse' : 'badge-both';
        const typeClass = eventBadgeClass(ev.action_type);
        const details   = buildDetails(ev);

        html += `<tr>
          <td><span class="event-badge ${typeClass}">${formatType(ev.action_type)}</span></td>
          <td><strong>${ev.symbol}</strong></td>
          <td style="font-size:13px;">${co}</td>
          <td style="white-space:nowrap;font-variant-numeric:tabular-nums;">${formatDate(ev.ex_date)}</td>
          <td class="ev-details">${details}</td>
          <td><span class="badge ${badgeCls}">${exchange}</span></td>
        </tr>`;
      }

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    // ── Refresh ─────────────────────────────────────────────────────────────
    async function refreshData() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning'); btn.disabled = true;
      try { await loadDashboardData(); }
      finally { btn.classList.remove('spinning'); btn.disabled = false; }
    }
  </script>
</body>
</html>
