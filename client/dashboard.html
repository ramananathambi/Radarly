<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Radarly</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    /* ── Event type badges ───────────────────────────────── */
    .event-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .ev-dividend { background: #dcfce7; color: #166534; }
    .ev-bonus    { background: #dbeafe; color: #1e40af; }
    .ev-split    { background: #ede9fe; color: #5b21b6; }
    .ev-buyback  { background: #ffedd5; color: #9a3412; }
    .ev-ipo      { background: #fef9c3; color: #713f12; }
    .ev-rights   { background: #fce7f3; color: #831843; }
    .ev-default  { background: var(--bg); color: var(--text-secondary); }

    /* ── Filter tabs (shared by both time-range and type rows) ── */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }
    .filter-row-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-right: 4px;
      white-space: nowrap;
    }
    .filter-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    /* Time range row uses a subtler accent */
    .range-tab.active {
      background: var(--text);
      color: var(--surface);
      border-color: var(--text);
    }
    .range-tab:hover { border-color: var(--text); color: var(--text); }

    .filters-wrap {
      margin-bottom: 16px;
    }

    /* ── Summary cards ───────────────────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .summary-card { cursor: default; text-align: center; }
    .summary-card.clickable { cursor: pointer; transition: box-shadow 0.15s; }
    .summary-card.clickable:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .summary-label {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 4px;
    }
    .summary-value {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .summary-action {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Stat card — black background, red icon ─────── */
    .stat-card-events,
    .stat-card-stocks,
    .stat-card-today  { background: #111111; border-color: transparent; }
    .stat-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .stat-card-events .stat-icon-wrap,
    .stat-card-stocks .stat-icon-wrap,
    .stat-card-today  .stat-icon-wrap { background: #cc0000; }
    /* Text colours on dark cards */
    .stat-card-events .summary-label,
    .stat-card-stocks .summary-label,
    .stat-card-today  .summary-label  { color: rgba(255,255,255,0.5); }
    .stat-card-events .summary-value,
    .stat-card-stocks .summary-value,
    .stat-card-today  .summary-value  { color: #ffffff; }
    .stat-card-events .summary-action,
    .stat-card-stocks .summary-action,
    .stat-card-today  .summary-action { color: #ff4444; }

    /* ── Section header row ──────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .section-header h2 { margin: 0; }

    /* ── Event details cell ──────────────────────────────── */
    .ev-details {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .ev-details strong { color: var(--text); font-weight: 600; }

    /* ── No events empty state ───────────────────────────── */
    .no-events {
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/dashboard.html"><img src="/assets/logo-nav.png" alt="Radarly" class="nav-logo"></a>
    <div class="nav-links">
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/stocks.html">Stocks</a>
      <a href="/settings.html">Alerts</a>
      <a href="/account.html">Account</a>
      <a href="#" onclick="logout()" style="color:var(--danger)">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div id="alert-box"></div>

    <h1 class="page-title" id="greeting">Dashboard</h1>

    <!-- Summary cards -->
    <div class="summary-grid">
      <div class="card summary-card stat-card-events">
        <div class="stat-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="summary-label">Upcoming Events</div>
        <div class="summary-value" id="event-count">—</div>
        <div class="summary-action" id="event-range-label">Next 30 days</div>
      </div>
      <div class="card summary-card clickable stat-card-stocks" onclick="window.location.href='/mystocks.html'" title="View My Stocks">
        <div class="stat-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
            <line x1="2" y1="20" x2="22" y2="20"/>
          </svg>
        </div>
        <div class="summary-label">Watchlist</div>
        <div class="summary-value" id="stock-count">—</div>
        <div class="summary-action">View My Stocks →</div>
      </div>
      <div class="card summary-card stat-card-today">
        <div class="stat-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <div class="summary-label">Watchlist Alerts</div>
        <div class="summary-value" id="watchlist-coverage">—</div>
        <div class="summary-action" id="watchlist-label">have upcoming events</div>
      </div>
    </div>

    <!-- Upcoming Events section -->
    <div class="section-header">
      <h2>Upcoming Events</h2>
    </div>

    <!-- Filters -->
    <div class="filters-wrap">
      <!-- Time range row -->
      <div class="filter-row" id="range-tabs">
        <span class="filter-row-label">Show:</span>
        <!-- populated by JS -->
      </div>
      <!-- Event type row (hidden until multiple types exist) -->
      <div class="filter-row" id="type-tabs" style="display:none;">
        <span class="filter-row-label">Type:</span>
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Events table -->
    <div id="events-container">
      <div class="spinner"></div>
    </div>
  </div>

  <footer class="site-footer">Built in Chennai ❤️ for India 🇮🇳</footer>

  <script src="/assets/app.js"></script>
  <script>
    // ── State ───────────────────────────────────────────────────────────────
    let allEvents    = [];
    let activeFilter = 'ALL';
    let activeDays   = 30;
    let sortColumn   = 'ex_date';
    let sortDir      = 'asc';

    const DAY_OPTIONS = [7, 14, 30, 60, 90];

    // ── Init ────────────────────────────────────────────────────────────────
    (async () => {
      const user = await requireLogin();
      if (!user) return;

      // Greeting
      const greetEl = document.getElementById('greeting');
      greetEl.innerHTML = `Hi ${user.name || 'there'}! <button class="refresh-btn" onclick="refreshData()" title="Refresh" id="refresh-btn"><span class="refresh-icon">&#x21bb;</span></button>`;

      // Phone nudge
      if (!user.phone) {
        document.getElementById('alert-box').innerHTML = `
          <div class="alert alert-warning" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <span>Add your WhatsApp number to receive stock alerts.</span>
            <a href="/account.html" class="btn btn-primary" style="text-decoration:none;padding:6px 16px;font-size:13px;">Add Phone Number</a>
          </div>
        `;
      }

      renderRangeTabs();
      await loadDashboardData();
    })();

    // ── Load data ───────────────────────────────────────────────────────────
    async function loadDashboardData() {
      // Show spinner in events area while fetching
      document.getElementById('events-container').innerHTML = '<div class="spinner"></div>';

      const [stocksRes, eventsRes] = await Promise.all([
        api('GET', '/api/user/stocks').catch(() => ({ stocks: [] })),
        api('GET', `/api/events/upcoming?days=${activeDays}`).catch(() => ({ events: [] })),
      ]);

      // Stock count
      document.getElementById('stock-count').textContent = stocksRes.stocks.length;

      // Store events
      allEvents    = eventsRes.events || [];
      activeFilter = 'ALL';  // Reset type filter on every data reload

      // Update summary card
      document.getElementById('event-count').textContent = allEvents.length;
      document.getElementById('event-range-label').textContent = `Next ${activeDays} days`;

      // Watchlist coverage: how many of my stocks have an upcoming event
      const mySymbols   = new Set(stocksRes.stocks.map(s => s.symbol));
      const matchCount  = new Set(allEvents.filter(e => mySymbols.has(e.symbol)).map(e => e.symbol)).size;
      const total       = mySymbols.size;
      document.getElementById('watchlist-coverage').textContent =
        total === 0 ? '—' : `${matchCount} / ${total}`;
      document.getElementById('watchlist-label').textContent =
        total === 0
          ? 'Add stocks to get started'
          : matchCount === 0
            ? 'no upcoming events'
            : `stock${matchCount !== 1 ? 's' : ''} with upcoming events`;

      renderTypeTabs();
      renderEvents(allEvents);
    }

    // ── Time range chips ────────────────────────────────────────────────────
    function renderRangeTabs() {
      const row = document.getElementById('range-tabs');
      // Keep the label span, replace only the buttons
      const label = row.querySelector('.filter-row-label');
      row.innerHTML = '';
      row.appendChild(label);

      for (const d of DAY_OPTIONS) {
        const btn = document.createElement('button');
        btn.className = `filter-tab range-tab${d === activeDays ? ' active' : ''}`;
        btn.textContent = d < 30 ? `${d} days` : d === 30 ? '1 month' : d === 60 ? '2 months' : '3 months';
        btn.onclick = () => setDays(d);
        row.appendChild(btn);
      }
    }

    async function setDays(days) {
      if (days === activeDays) return;
      activeDays = days;
      renderRangeTabs();
      await loadDashboardData();
    }

    // ── Event type chips ────────────────────────────────────────────────────
    function renderTypeTabs() {
      const typesInData = [...new Set(allEvents.map(e => e.action_type))].sort();
      const row = document.getElementById('type-tabs');

      if (typesInData.length <= 1) {
        row.style.display = 'none';
        return;
      }

      row.style.display = 'flex';
      const label = row.querySelector('.filter-row-label');
      row.innerHTML = '';
      row.appendChild(label);

      const tabs = ['ALL', ...typesInData];
      for (const t of tabs) {
        const count = t === 'ALL' ? allEvents.length : allEvents.filter(e => e.action_type === t).length;
        const btn = document.createElement('button');
        btn.className = `filter-tab${t === activeFilter ? ' active' : ''}`;
        btn.dataset.type = t;
        btn.innerHTML = `${t === 'ALL' ? 'All Types' : formatType(t)} <span style="opacity:0.65;font-size:12px;">(${count})</span>`;
        btn.onclick = () => setTypeFilter(t);
        row.appendChild(btn);
      }
    }

    function setTypeFilter(type) {
      activeFilter = type;
      // Toggle active class
      document.querySelectorAll('#type-tabs .filter-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
      });
      const filtered = type === 'ALL' ? allEvents : allEvents.filter(e => e.action_type === type);
      renderEvents(filtered);
    }

    // ── Event type helpers ──────────────────────────────────────────────────
    function formatType(code) {
      const names = {
        DIVIDEND: 'Dividend',
        BONUS:    'Bonus',
        SPLIT:    'Split',
        BUYBACK:  'Buyback',
        IPO:      'IPO',
        RIGHTS:   'Rights',
      };
      return names[code] || code;
    }

    function eventBadgeClass(code) {
      const cls = {
        DIVIDEND: 'ev-dividend',
        BONUS:    'ev-bonus',
        SPLIT:    'ev-split',
        BUYBACK:  'ev-buyback',
        IPO:      'ev-ipo',
        RIGHTS:   'ev-rights',
      };
      return cls[code] || 'ev-default';
    }

    // ── Parse amount from raw text (fallback for older DB records) ───────────
    function extractAmountFromText(text) {
      if (!text) return null;
      // Handles: "Rs 4.25", "Rs. 4.25", "Rs. - 4.25", "INR 4.25", "₹4.25"
      const m = text.match(/(?:RS\.?|INR|₹)\s*[-–]?\s*(\d+(?:\.\d+)?)/i);
      return m ? parseFloat(m[1]) : null;
    }

    // ── Build detail string per action type ─────────────────────────────────
    function buildDetails(event) {
      const d         = event.details || {};
      const lastPrice = event.stocks_master?.last_price;
      const type      = event.action_type;
      const raw       = d.raw_purpose || '';

      if (type === 'DIVIDEND') {
        // Use stored amount, or parse from raw_purpose as fallback
        const amount = d.amount || extractAmountFromText(raw);
        if (amount) {
          const yieldPct = lastPrice ? ((amount / lastPrice) * 100).toFixed(2) : null;
          return `<strong>₹${amount}/share</strong>` +
            (yieldPct ? `<br><span style="color:var(--text-secondary);font-size:11px;">Yield: ${yieldPct}%</span>` : '');
        }
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'BONUS') {
        const ratioMatch = raw.match(/\d+\s*:\s*\d+/);
        if (ratioMatch) return `<strong>${ratioMatch[0]}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Bonus shares</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'SPLIT') {
        const ratioMatch = raw.match(/\d+\s*:\s*\d+/);
        if (ratioMatch) return `<strong>${ratioMatch[0]}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Split ratio</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'BUYBACK') {
        const amount = extractAmountFromText(raw);
        if (amount) return `<strong>₹${amount.toLocaleString('en-IN')}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Buyback price</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      if (type === 'RIGHTS') {
        const ratioMatch = raw.match(/\d+\s*:\s*\d+/);
        if (ratioMatch) return `<strong>${ratioMatch[0]}</strong><br><span style="color:var(--text-secondary);font-size:11px;">Rights ratio</span>`;
        return raw ? truncate(raw, 60) : '—';
      }

      return raw ? truncate(raw, 60) : '—';
    }

    function truncate(str, n) {
      return str.length > n ? str.substring(0, n) + '…' : str;
    }

    // ── Sort ─────────────────────────────────────────────────────────────────
    function toggleSort(col) {
      if (sortColumn === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
      else { sortColumn = col; sortDir = 'asc'; }
      const filtered = activeFilter === 'ALL' ? allEvents : allEvents.filter(e => e.action_type === activeFilter);
      renderEvents(filtered);
    }

    function sortEventsData(events) {
      return [...events].sort((a, b) => {
        let valA, valB;
        if (sortColumn === 'company_name') {
          valA = (a.stocks_master?.company_name || '').toLowerCase();
          valB = (b.stocks_master?.company_name || '').toLowerCase();
        } else if (sortColumn === 'exchange') {
          valA = (a.stocks_master?.exchange || '').toLowerCase();
          valB = (b.stocks_master?.exchange || '').toLowerCase();
        } else {
          valA = (a[sortColumn] || '').toString().toLowerCase();
          valB = (b[sortColumn] || '').toString().toLowerCase();
        }
        if (valA < valB) return sortDir === 'asc' ? -1 : 1;
        if (valA > valB) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });
    }

    // ── Render events table ─────────────────────────────────────────────────
    function renderEvents(events) {
      const container = document.getElementById('events-container');

      if (events.length === 0) {
        const label = activeDays < 30 ? `${activeDays} days` :
                      activeDays === 30 ? '1 month' :
                      activeDays === 60 ? '2 months' : '3 months';
        container.innerHTML = `<div class="card no-events">No upcoming events in the next ${label}.</div>`;
        return;
      }

      const sorted = sortEventsData(events);
      const sc = (col) => `sortable ${sortColumn === col ? sortDir : ''}`;

      let html = '<div class="table-wrap"><table><thead><tr>';
      html += `<th class="${sc('action_type')}" onclick="toggleSort('action_type')">Type</th>`;
      html += `<th class="${sc('symbol')}" onclick="toggleSort('symbol')">Symbol</th>`;
      html += `<th class="${sc('company_name')}" onclick="toggleSort('company_name')">Company</th>`;
      html += `<th class="${sc('ex_date')}" onclick="toggleSort('ex_date')">Ex-Date</th>`;
      html += '<th>Details</th>';
      html += `<th class="${sc('exchange')}" onclick="toggleSort('exchange')">Exchange</th>`;
      html += '</tr></thead><tbody>';

      for (const ev of sorted) {
        const co        = ev.stocks_master?.company_name || ev.symbol;
        const exchange  = ev.stocks_master?.exchange || '—';
        const badgeCls  = exchange === 'NSE' ? 'badge-nse' : exchange === 'BSE' ? 'badge-bse' : 'badge-both';
        const typeClass = eventBadgeClass(ev.action_type);
        const details   = buildDetails(ev);

        html += `<tr>
          <td><span class="event-badge ${typeClass}">${formatType(ev.action_type)}</span></td>
          <td><strong>${ev.symbol}</strong></td>
          <td style="font-size:13px;">${co}</td>
          <td style="white-space:nowrap;font-variant-numeric:tabular-nums;">${formatDate(ev.ex_date)}</td>
          <td class="ev-details">${details}</td>
          <td><span class="badge ${badgeCls}">${exchange}</span></td>
        </tr>`;
      }

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    // ── Refresh ─────────────────────────────────────────────────────────────
    async function refreshData() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning'); btn.disabled = true;
      try { await loadDashboardData(); }
      finally { btn.classList.remove('spinning'); btn.disabled = false; }
    }
  </script>
</body>
</html>
