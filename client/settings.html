<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alert Settings — Radarly</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    .pref-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .pref-info { flex: 1; }
    .pref-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pref-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .pref-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .scope-select {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      background: var(--surface);
      cursor: pointer;
    }
    .scope-select:disabled { opacity: 0.5; cursor: not-allowed; }
    .pref-status {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .inactive-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    /* ── Toggle ripple ───────────────────────────────────── */
    .toggle-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(233,50,68,0.18);
      width: 44px; height: 44px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: toggle-ripple-out 0.45s ease forwards;
      pointer-events: none;
    }
    @keyframes toggle-ripple-out {
      to { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    }

    /* ── Animated save checkmark ─────────────────────────── */
    @keyframes check-draw {
      from { stroke-dashoffset: 30; opacity: 0; }
      to   { stroke-dashoffset: 0;  opacity: 1; }
    }
    .check-svg {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: check-draw 0.3s ease 0.05s forwards;
      vertical-align: middle;
      margin-right: 2px;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/dashboard.html"><img src="/assets/logo-nav.png" alt="Radarly" class="nav-logo"></a>
    <div class="nav-links">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/stocks.html">Stocks</a>
      <a href="/settings.html" class="active">Alerts</a>
      <a href="/account.html">Account</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div id="alert-box"></div>

    <h1 class="page-title">Alert Settings <button class="refresh-btn" onclick="refreshData()" title="Refresh" id="refresh-btn"><span class="refresh-icon">&#x21bb;</span></button></h1>

    <!-- Active alerts -->
    <div class="section-title">Active Alert Types</div>
    <div id="active-prefs">
      <div class="spinner"></div>
    </div>

    <!-- Upcoming alert types (inactive) -->
    <div style="margin-top:24px;">
      <div class="section-title">Coming Soon</div>
      <div id="inactive-prefs"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div>Built in Chennai ❤️ for India 🇮🇳</div>
    <div style="margin-top:8px; opacity:0.6; font-size:12px;">© 2026 Radarly. All rights reserved.</div>
  </footer>

  <script src="/assets/app.js"></script>
  <script>
    const alertDescriptions = {
      DIVIDEND:    'Get alerts 2 days before ex-dividend dates via WhatsApp.',
      BONUS:       'Get notified when bonus shares are announced.',
      SPLIT:       'Get notified about stock split events.',
      RIGHTS:      'Get notified when rights issues are announced.',
      BUYBACK:     'Get notified about share buyback events.',
    };

    (async () => {
      const user = await requireLogin();
      if (!user) return;
      await loadAlertPrefs();
    })();

    async function loadAlertPrefs() {
      const prefsRes = await api('GET', '/api/user/preferences').catch(() => ({ preferences: [] }));
      const prefs = prefsRes.preferences || [];
      renderActivePrefs(prefs.filter(p => p.alert_types?.is_active));
      renderInactivePrefs(prefs.filter(p => !p.alert_types?.is_active));
    }

    async function refreshData() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning'); btn.disabled = true;
      try { await loadAlertPrefs(); }
      finally { btn.classList.remove('spinning'); btn.disabled = false; }
    }

    function renderActivePrefs(prefs) {
      const container = document.getElementById('active-prefs');

      if (prefs.length === 0) {
        container.innerHTML = '<div class="card" style="color:var(--text-secondary);">No active alert types configured.</div>';
        return;
      }

      let html = '';
      for (const p of prefs) {
        const code = p.alert_type;
        const desc = alertDescriptions[code] || `Alerts for ${code} corporate actions.`;
        const isEnabled = p.is_enabled;
        const scope = p.scope || 'all_stocks';

        html += `
          <div class="card pref-card" id="pref-${code}">
            <div class="pref-info">
              <div class="pref-title">${formatAlertType(code)}</div>
              <div class="pref-desc">${desc}</div>
              <div class="pref-status" id="status-${code}"></div>
            </div>
            <div class="pref-controls">
              <select class="scope-select" id="scope-${code}" ${!isEnabled ? 'disabled' : ''}
                      onchange="updatePref('${code}')">
                <option value="all_stocks" ${scope === 'all_stocks' ? 'selected' : ''}>All Stocks</option>
                <option value="selected_stocks" ${scope === 'selected_stocks' ? 'selected' : ''}>My Stocks Only</option>
              </select>
              <label class="toggle">
                <input type="checkbox" id="toggle-${code}" ${isEnabled ? 'checked' : ''}
                       onchange="updatePref('${code}')" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function renderInactivePrefs(prefs) {
      const container = document.getElementById('inactive-prefs');

      // Show all known inactive types
      const inactiveCodes = ['BONUS', 'SPLIT', 'RIGHTS', 'BUYBACK'].filter(
        code => !document.getElementById(`pref-${code}`)
      );

      if (inactiveCodes.length === 0) {
        container.innerHTML = '';
        return;
      }

      let html = '';
      for (const code of inactiveCodes) {
        const desc = alertDescriptions[code] || `Alerts for ${code} corporate actions.`;
        html += `
          <div class="card pref-card" style="opacity:0.6;">
            <div class="pref-info">
              <div class="pref-title">${formatAlertType(code)} <span class="inactive-badge">Coming Soon</span></div>
              <div class="pref-desc">${desc}</div>
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function formatAlertType(code) {
      return code.charAt(0) + code.slice(1).toLowerCase() + ' Alerts';
    }

    async function updatePref(code) {
      const toggle = document.getElementById(`toggle-${code}`);
      const scopeSelect = document.getElementById(`scope-${code}`);
      const statusEl = document.getElementById(`status-${code}`);

      const isEnabled = toggle.checked;
      const scope = scopeSelect.value;

      // Enable/disable scope select based on toggle
      scopeSelect.disabled = !isEnabled;

      statusEl.textContent = 'Saving...';
      statusEl.style.color = 'var(--text-secondary)';

      try {
        await api('PUT', '/api/user/preferences', {
          alert_type: code,
          is_enabled: isEnabled,
          scope: scope,
        });
        statusEl.innerHTML = `<svg class="check-svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
          stroke="var(--success)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/></svg> Saved`;
        statusEl.style.color = 'var(--success)';
        setTimeout(() => { statusEl.innerHTML = ''; }, 2200);
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        statusEl.style.color = 'var(--danger)';
      }
    }

    // ── Toggle ripple (delegated) ─────────────────────────────────────────
    document.addEventListener('click', (e) => {
      const label = e.target.closest('.toggle');
      if (!label) return;
      const ripple = document.createElement('span');
      ripple.className = 'toggle-ripple';
      label.style.position = 'relative';
      label.appendChild(ripple);
      setTimeout(() => ripple.remove(), 460);
    });
  </script>
</body>
</html>
